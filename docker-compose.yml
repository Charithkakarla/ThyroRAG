services:
  tika:
    image: apache/tika:latest-full
    container_name: thyrorag-tika
    ports:
      - "9998:9998"
    restart: unless-stopped
    environment:
      - TIKA_CHILD_JAVA_OPTS=-Xms256m -Xmx2g

  qdrant:
    image: qdrant/qdrant:latest
    container_name: thyrorag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_storage:
